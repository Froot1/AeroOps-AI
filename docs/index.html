<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroOps AI</title>
    <meta
      name="description"
      content="AeroOps AI documentation and project landing page."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --card: #111a2b;
        --text: #e6edf3;
        --muted: #9fb0c3;
        --accent: #58a6ff;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f8fa;
          --card: #ffffff;
          --text: #1f2328;
          --muted: #57606a;
          --accent: #0969da;
        }
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 800px at 10% -10%, #1f6feb22, transparent),
                    radial-gradient(1000px 700px at 100% 0%, #2ea04322, transparent),
                    var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      main {
        width: min(860px, 100%);
        background: color-mix(in oklab, var(--card) 90%, transparent);
        border: 1px solid color-mix(in oklab, var(--muted) 35%, transparent);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        line-height: 1.15;
      }

      p {
        margin: 0.75rem 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        margin-top: 1.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      a.button {
        text-decoration: none;
        border: 1px solid color-mix(in oklab, var(--accent) 60%, transparent);
        color: var(--text);
        background: color-mix(in oklab, var(--accent) 25%, transparent);
        padding: 0.65rem 0.95rem;
        border-radius: 10px;
        font-weight: 600;
      }

      a.button:hover {
        filter: brightness(1.06);
      }

      footer {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to AeroOps AI</h1>
      <p>
        This is the starter landing page for the AeroOps AI project documentation.
      </p>
      <p>
        Use this page as your project home, and add more documentation under
        <code>/docs</code> as the project evolves.
      </p>

      <div class="actions">
        <a class="button" href="https://github.com/Froot1/AeroOps-AI">View Repository</a>
        <a class="button" href="./">Docs Home</a>
      </div>

      <footer>
        Built with GitHub Pages from the <code>docs/</code> folder.
      </footer>
    </main>
  </body>
</html>
